    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="container">
        <nav>
        </nav>
        <main class="main-container">
            <div class="boxes">
                <div class="box" id="box1">
                    <label for="amount">Amount</label>
                    <div class="inputs">
                        <div class="input-group">
                            <input type="text" id="amount" placeholder="Enter Amount">
                            <span id="underline"></span>
                        </div>
                        <div class="currency">
                            <div class="currencyValue list-items">
                                <div class="currencyValueText" id="countryFrom">
                                <img src="https://flagsapi.com/US/flat/64.png">
                                <p id="convertFrom">USD</p>
                                </div>
                                <svg id="enableList1" class="icon" xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="512" height="298" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" image-rendering="optimizeQuality" fill-rule="evenodd" clip-rule="evenodd" viewBox="0 0 512 298.04"><path fill-rule="nonzero" d="M12.08 70.78c-16.17-16.24-16.09-42.54.15-58.7 16.25-16.17 42.54-16.09 58.71.15L256 197.76 441.06 12.23c16.17-16.24 42.46-16.32 58.71-.15 16.24 16.16 16.32 42.46.15 58.7L285.27 285.96c-16.24 16.17-42.54 16.09-58.7-.15L12.08 70.78z"/></svg>
                            </div>
                            <ul id="list1" class="hidden">
                                <li class="list-items" data-countryTag="USD">
                                    <img src="https://flagsapi.com/US/flat/64.png">
                                    USD
                                </li>
                                <li class="list-items" data-countryTag="EUR">
                                    <img src="https://flagsapi.com/FR/flat/64.png">
                                    EUR
                                </li>
                                <li class="list-items" data-countryTag="SAR">
                                    <img src="https://flagsapi.com/SA/flat/64.png">
                                    SAR
                                </li>
                                <li class="list-items" data-countryTag="BDT">
                                    <img src="https://flagsapi.com/BD/flat/64.png">
                                    BDT
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="icon-circle">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="512" height="298" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" image-rendering="optimizeQuality" fill-rule="evenodd" clip-rule="evenodd" viewBox="0 0 512 298.04"><path fill-rule="nonzero" d="M12.08 70.78c-16.17-16.24-16.09-42.54.15-58.7 16.25-16.17 42.54-16.09 58.71.15L256 197.76 441.06 12.23c16.17-16.24 42.46-16.32 58.71-.15 16.24 16.16 16.32 42.46.15 58.7L285.27 285.96c-16.24 16.17-42.54 16.09-58.7-.15L12.08 70.78z"/></svg>
                </div>
                <div class="box"id="box2">
                    <label>Converted to</label>
                    <div id="results">
                        <p id="converted-price">0</p>
                        <div class="currency">
                            <div class="currencyValue list-items">
                                <div class="currencyValueText" id="countryTo">
                                <img src="https://flagsapi.com/US/flat/64.png">
                                <p id="convertTo">USD</p>
                                </div>
                                <svg id="enableList2" class="icon" xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="512" height="298" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" image-rendering="optimizeQuality" fill-rule="evenodd" clip-rule="evenodd" viewBox="0 0 512 298.04"><path fill-rule="nonzero" d="M12.08 70.78c-16.17-16.24-16.09-42.54.15-58.7 16.25-16.17 42.54-16.09 58.71.15L256 197.76 441.06 12.23c16.17-16.24 42.46-16.32 58.71-.15 16.24 16.16 16.32 42.46.15 58.7L285.27 285.96c-16.24 16.17-42.54 16.09-58.7-.15L12.08 70.78z"/></svg>
                            </div>
                            <ul id="list2" class="hidden">
                                <li class="list-items" data-countryTag="USD">
                                    <img src="https://flagsapi.com/US/flat/64.png">
                                    USD
                                </li>
                                <li class="list-items" data-countryTag="EUR">
                                    <img src="https://flagsapi.com/FR/flat/64.png">
                                    EUR
                                </li>
                                <li class="list-items" data-countryTag="SAR">
                                    <img src="https://flagsapi.com/SA/flat/64.png">
                                    SAR
                                </li>
                                <li class="list-items" data-countryTag="BDT">
                                    <img src="https://flagsapi.com/BD/flat/64.png">
                                    BDT
                                </li>
                            </ul>
                        </div>
                    </div>
                    </div>
                </div>
                <div id="bottom-section">
                    <button id="swap-btn">Swap</button>
                </div>
        </main>
    </div>
    <script type="module" src="index.js"></script>
